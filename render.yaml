services:
  # ── Spring Boot Backend (Docker) ──────────────────────────────────────────
  - type: web
    name: smartattend-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        sync: false          # Set to your Render PostgreSQL Internal Database URL
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
    healthCheckPath: /api/users

  # ── React / Vite Frontend (Docker + Nginx) ────────────────────────────────
  - type: web
    name: smartattend-frontend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to: https://smartattend-backend.onrender.com/api

databases:
  # Render-managed PostgreSQL (Free tier)
  - name: smartattend-db
    plan: free
    region: oregon
