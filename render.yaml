services:
  # ── Spring Boot Backend (Docker) ──────────────────────────────────────────
  - type: web
    name: smartattend-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: smartattend-db
          property: jdbcConnectionString   # renders as jdbc:postgresql://...
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smartattend-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smartattend-db
          property: password
    healthCheckPath: /api/users

  # ── React / Vite Frontend (Docker + Nginx) ────────────────────────────────
  - type: web
    name: smartattend-frontend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to: https://smartattend-backend.onrender.com/api

databases:
  # Render-managed PostgreSQL (Free tier)
  - name: smartattend-db
    plan: free
    region: oregon
