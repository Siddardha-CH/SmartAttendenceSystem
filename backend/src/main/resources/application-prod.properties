# Production profile — active when SPRING_PROFILES_ACTIVE=prod
# Render injects SPRING_DATASOURCE_URL (jdbc format), USERNAME, PASSWORD automatically
# via the fromDatabase bindings in render.yaml

# Render sets PORT env var; default to 8080 locally
server.port=${PORT:8080}

# Database — Render provides SPRING_DATASOURCE_URL as a jdbc:postgresql:// URL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console disabled in production
spring.h2.console.enabled=false

# File upload size
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
