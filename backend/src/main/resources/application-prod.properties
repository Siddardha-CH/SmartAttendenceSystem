# Production profile — active when SPRING_PROFILES_ACTIVE=prod
# Render injects DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD automatically
# via the fromDatabase bindings in render.yaml

# Render sets PORT env var for the web service; default to 8080 locally
server.port=${PORT:8080}

# Build the JDBC URL from individual DB parts injected by Render
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console disabled in production
spring.h2.console.enabled=false

# File upload size
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
